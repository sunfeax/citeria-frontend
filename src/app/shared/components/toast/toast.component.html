<div
  class="fixed bottom-6 right-6 z-[1000] flex flex-col gap-3 w-[min(360px,calc(100vw-32px))]"
  aria-live="polite"
  aria-atomic="true"
>
  @for (toast of toastService.toasts(); track toast.id) {

  <div
    class="pointer-events-auto grid grid-cols-[auto_1fr_auto] items-start gap-3 rounded-2xl
           border-l-4 p-4 shadow-lg ring-1"
    animate.enter="toast-enter"
    animate.leave="toast-leave"

    [ngClass]="{
      'border-emerald-500 bg-emerald-200 text-emerald-950 ring-emerald-200': toast.type === 'success',
      'border-red-700 bg-red-600 text-white ring-red-700/40': toast.type === 'error',
      'border-sky-500 bg-sky-200 text-sky-950 ring-sky-200': toast.type === 'info',
      'border-amber-500 bg-amber-200 text-amber-950 ring-amber-200': toast.type === 'warning'
    }"
  >

    <div class="flex justify-center items-center self-center mt-[2px] opacity-90">
      <lucide-icon [img]="iconFor(toast.type)" class="h-5 w-5"></lucide-icon>
    </div>

    <div>
      @if (toast.title) {
        <div class="text-sm font-semibold mb-1">
          {{ toast.title }}
        </div>
      }

      <div class="text-sm">
        {{ toast.message }}
      </div>
    </div>

    <button
      class="flex items-center justify-center p-1 opacity-90 hover:opacity-100"
      (click)="toastService.remove(toast.id)"
    >
      <lucide-icon [img]="XIcon" class="h-4 w-4"></lucide-icon>
    </button>

  </div>

  }
</div>
