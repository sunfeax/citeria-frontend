<button
  [type]="type"
  [disabled]="disabled || loading"
  [class]="buttonClasses"
  [attr.aria-busy]="loading">
  @if (loading) {
    <lucide-icon
      [img]="loaderCircleIcon"
      [class]="loaderClasses"
      aria-hidden="true">
    </lucide-icon>
  } @else {
    <span>{{ text }}</span>
  }
</button>
